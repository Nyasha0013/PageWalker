name: pagewalker
description: A magical book journaling app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.3.4
  http: ^1.2.1

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.67.0
  flutter_staggered_grid_view: ^0.7.0
  reorderables: ^0.6.0

  # Utils
  shared_preferences: ^2.2.3
  share_plus: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

