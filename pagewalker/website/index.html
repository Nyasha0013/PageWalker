<!DOCTYPE html>
<html lang="en" data-pw-page="web-app">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16140f" />
    <meta name="description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <meta property="og:title" content="Pagewalker" />
    <meta property="og:description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pagewalker.org/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pagewalker" />
    <meta name="twitter:description" data-i18n-meta="appShell.metaDescription" content="Pagewalker web app: library, discover, social, clubs, and reader tools." />
    <link rel="canonical" href="https://pagewalker.org/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <title data-i18n-title="appShell.title">Pagewalker — Web App</title>
    <script>document.documentElement.setAttribute("data-theme", "dark");</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://dwbhapuozjfaxsexydux.supabase.co" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      (function () {
        var p = location.pathname;
        if (p !== "/" && p !== "") return;
        var imgs = [
          ["/assets/hero-book-cloud.png", "(min-width: 861px)"],
          ["/assets/hero-book-cloud-portrait.png", "(max-width: 860px) and (orientation: portrait)"],
          ["/assets/hero-book-cloud-mobile.png", "(max-width: 860px) and (orientation: landscape)"],
        ];
        for (var i = 0; i < imgs.length; i++) {
          var l = document.createElement("link");
          l.rel = "preload";
          l.as = "image";
          l.href = imgs[i][0];
          l.media = imgs[i][1];
          document.head.appendChild(l);
        }
      })();
    </script>
  </head>
  <body>
    <div id="pw-immersive-backdrop" class="pw-immersive-backdrop" hidden aria-hidden="true"></div>
    <a class="skip-link" href="#main" data-i18n="common.skip">Skip to content</a>
    <header class="site-header">
      <div class="wrap inner app-header-inner">
        <div class="app-header-start">
          <a class="logo" href="/" data-link-route="/">Pagewalker</a>
        </div>

        <nav class="site-nav-top" aria-label="Primary">
          <a class="site-nav-top__link" href="/" data-link-route="/" data-i18n="appNav.home">Home</a>
          <a class="site-nav-top__link" href="/explore" data-link-route="/explore" data-i18n="appNav.explore">Explore</a>
          <a class="site-nav-top__link" href="/library" data-link-route="/library" data-i18n="appNav.library">Library</a>
          <a class="site-nav-top__link" href="/social" data-link-route="/social" data-i18n="appNav.social">Social</a>
          <a class="site-nav-top__link" href="/clubs" data-link-route="/clubs" data-i18n="appNav.clubs">Clubs</a>
          <a class="site-nav-top__link" href="/reader" data-link-route="/reader" data-i18n="appNav.reader">Reader</a>
          <a class="site-nav-top__link" href="/profile" data-link-route="/profile" data-i18n="appNav.profile">Profile</a>
        </nav>

        <div class="app-header-right">
          <div class="site-controls">
            <select class="pw-select pw-lang-select" data-i18n-attr="aria-label:toolbar.language" aria-label="Language">
              <option value="en">English</option>
              <option value="hu">Magyar</option>
            </select>
          </div>
          <div class="pw-user-menu" id="pw-user-menu">
            <button
              type="button"
              class="pw-user-avatar"
              id="pw-user-avatar"
              aria-expanded="false"
              aria-haspopup="true"
              aria-controls="pw-user-dropdown"
              data-i18n-attr="aria-label:toolbar.userMenu"
            >
              <img
                id="pw-user-photo"
                class="pw-user-avatar__photo"
                alt=""
                width="36"
                height="36"
                loading="lazy"
                decoding="async"
                hidden
              />
              <span class="pw-user-avatar__face pw-user-avatar__face--text" id="pw-user-initial" hidden></span>
              <span class="pw-user-avatar__face pw-user-avatar__face--icon" id="pw-user-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
            </button>
            <div class="pw-user-menu__panel" id="pw-user-dropdown" role="region" hidden>
              <div class="pw-user-menu__body" id="pw-user-menu-body"></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="main" class="wrap web-app-main">
      <div id="pw-err" class="pw-banner" hidden></div>
      <div id="pw-ok" class="pw-banner pw-banner--success" hidden></div>
      <section id="pw-route-content" class="webapp-content"></section>
    </main>

    <footer>
      <div class="wrap inner">
        <div class="links">
          <a href="/about" data-i18n="nav.about">About</a>
          <a href="/updates" data-i18n="nav.updates">Updates</a>
          <a href="/privacy" data-i18n="nav.privacy">Privacy</a>
          <a href="/terms" data-i18n="nav.terms">Terms</a>
          <a href="mailto:support@pagewalker.org" data-i18n="nav.support">Support</a>
          <a href="mailto:support@pagewalker.org">support@pagewalker.org</a>
        </div>
        <p class="copy" data-i18n="common.copy">© 2026 Pagewalker. All rights reserved.</p>
      </div>
    </footer>

    <nav class="pw-bottom-nav" aria-label="Primary navigation">
      <a href="/" data-link-route="/" data-bottom-nav="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-10.5Z"/></svg>
        <span data-i18n="appNav.home">Home</span>
      </a>
      <a href="/library" data-link-route="/library" data-bottom-nav="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span data-i18n="appNav.library">Library</span>
      </a>
      <a href="/explore" data-link-route="/explore" data-bottom-nav="explore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <span data-i18n="appNav.explore">Explore</span>
      </a>
      <a href="/explore#trending" data-link-route="/explore" data-discover-jump="trending" data-bottom-nav="trending">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 17l6-6 4 4 8-10"/><path d="M14 5h7v7"/></svg>
        <span data-i18n="home.navTrending">Trending</span>
      </a>
      <a href="/social" data-link-route="/social" data-bottom-nav="social">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
        <span data-i18n="appNav.social">Social</span>
      </a>
    </nav>

    <script defer src="/js/pw-i18n.js"></script>
    <script defer src="/js/pw-theme.js"></script>
    <script defer src="/js/public-config.js"></script>
    <script type="module" src="/js/pw-webapp.js"></script>
  </body>
</html>
