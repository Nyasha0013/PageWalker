<!DOCTYPE html>
<html lang="en" data-pw-page="update-password" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" data-i18n-meta="up.muted" content="Set a new Pagewalker password." />
    <meta name="theme-color" content="#04020e" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <title data-i18n-title="up.title">New password — Pagewalker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skip">Skip to content</a>
    <header class="site-header">
      <div class="wrap inner">
        <a class="logo" href="/">Pagewalker</a>
        <nav class="nav" aria-label="Main">
          <a href="/" data-i18n="nav.home">Home</a>
          <a href="/updates" data-i18n="nav.updates">Updates</a>
          <a href="/sign-in" data-i18n="nav.signIn">Sign in</a>
          <a href="/sign-up" data-i18n="nav.signUp">Sign up</a>
          <a href="/privacy" data-i18n="nav.privacy">Privacy</a>
          <a href="/terms" data-i18n="nav.terms">Terms</a>
          <a href="mailto:support@pagewalker.org" data-i18n="nav.support">Support</a>
          <div class="site-controls">
            <select class="pw-select pw-lang-select" data-i18n-attr="aria-label:toolbar.language" aria-label="Language">
              <option value="en">English</option>
              <option value="hu">Magyar</option>
            </select>
</div>
        </nav>
      </div>
    </header>

    <main id="main" class="wrap page-auth">
      <h1 data-i18n="up.h1">Set new password</h1>
      <p class="muted" data-i18n="up.muted">Open this page from the link in your email.</p>
      <div id="pw-pending-session" class="muted" data-i18n="up.pending">Verifying your reset link…</div>
      <div id="pw-err" class="pw-banner" hidden></div>
      <div id="pw-ok" class="pw-banner pw-banner--success" hidden></div>
      <form id="pw-form-update-password" class="form-stack">
        <label>
          <span data-i18n="up.password">New password</span>
          <input name="password" type="password" autocomplete="new-password" required minlength="6" />
        </label>
        <label>
          <span data-i18n="up.confirm">Confirm new password</span>
          <input name="password2" type="password" autocomplete="new-password" required minlength="6" />
        </label>
        <button type="submit" class="btn" data-i18n="up.submit">Update password</button>
      </form>
      <p class="subnav"><a href="/sign-in" data-i18n="up.back">Sign in</a></p>
    </main>

    <footer>
      <div class="wrap inner">
        <div class="links">
          <a href="/updates" data-i18n="nav.updates">Updates</a>
          <a href="/privacy" data-i18n="nav.privacy">Privacy</a>
          <a href="/terms" data-i18n="nav.terms">Terms</a>
          <a href="mailto:support@pagewalker.org">support@pagewalker.org</a>
        </div>
        <p class="copy" data-i18n="common.copy">© 2026 Pagewalker. All rights reserved.</p>
      </div>
    </footer>
    <script src="/js/pw-i18n.js"></script>
    <script src="/js/pw-space-bg.js"></script>
    <script src="/js/pw-theme.js"></script>
    <script src="/js/public-config.js"></script>
    <script type="module" src="/js/pw-app.js"></script>
  </body>
</html>
