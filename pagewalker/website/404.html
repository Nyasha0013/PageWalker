<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-title="e404.title">Page not found — Pagewalker</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#04020e" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skip">Skip to content</a>
    <header class="site-header">
      <div class="wrap inner">
        <a class="logo" href="/">Pagewalker</a>
        <nav class="nav" aria-label="Main">
          <a href="/" data-i18n="nav.home">Home</a>
          <a href="/updates" data-i18n="nav.updates">Updates</a>
          <a href="/sign-in" data-i18n="nav.signIn">Sign in</a>
          <div class="site-controls">
            <select class="pw-select pw-lang-select" data-i18n-attr="aria-label:toolbar.language" aria-label="Language">
              <option value="en">English</option>
              <option value="hu">Magyar</option>
            </select>
</div>
        </nav>
      </div>
    </header>
    <main class="wrap page-404" id="main">
      <p class="e404-kicker" data-i18n="e404.kicker">404</p>
      <h1 data-i18n="e404.h1">This page wandered off</h1>
      <p class="e404-text" data-i18n="e404.text">Like a bookmark that slipped out — let's get you back to something good to read.</p>
      <p class="e404-actions">
        <a class="btn" href="/" data-i18n="e404.backHome">Back home</a>
        <a class="btn btn-outline" href="/updates" data-i18n="e404.latest">Latest updates</a>
      </p>
    </main>
    <footer>
      <div class="wrap inner">
        <p class="copy" data-i18n="common.copyShort">© 2026 Pagewalker</p>
      </div>
    </footer>
    <script src="/js/pw-i18n.js"></script>
    <script src="/js/pw-space-bg.js"></script>
    <script src="/js/pw-theme.js"></script>
  </body>
</html>
